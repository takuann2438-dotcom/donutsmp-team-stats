<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonutSMP Team Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Team Stats Leaderboard</h1>
    <p id="time" class="update-time">データを読み込み中...</p>
    <div style="margin-bottom: 20px;">
    <button id="formatBtn" onclick="toggleFormat()" style="padding: 8px 16px; cursor: pointer; background: #444; color: white; border: 1px solid #666; border-radius: 4px;">
        K/M表記に切り替え
    </button>
    </div>
    
    <table id="statsTable">
        <thead>
            <tr>
                <th>プレイヤー名</th>
                <th>所持金 ($)</th>
                <th>キル数</th>
                <th>デス数</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>

name: Update DonutSMP Team Stats

on:
  schedule:
    - cron: '*/5 * * * *' # 5分おきに実行（GitHubの仕様で遅延あり）
  workflow_dispatch:      # ボタンを押して手動で実行することも可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # ファイルをリポジトリに保存するために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run update script
        run: node index.js
        env:
          DONUT_API_KEY: ${{ secrets.DONUT_API_KEY }} # GitHubのSecretsから読み込む

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add team_stats.json
          git commit -m "Update team stats: $(date)" || exit 0 # 変化がない場合はスキップ
          git push